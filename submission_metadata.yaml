ai_tools_used:
  - "Claude"  # Architecture, code, validation against real dataset

ai_usage_summary: |
  Used Claude (Anthropic) as the primary development tool throughout — for
  architecture discussion, code implementation, and validation against the
  real 100K-candidate dataset. Importantly, candidate data was never fed to
  any hosted LLM during the ranking pipeline itself: the scoring pipeline
  is fully deterministic and runs locally (no API calls). Claude was used
  offline for development only, not as a component in the ranking system.
  Bugs found and fixed during validation (false-positive honeypot signal,
  vocabulary gap in must-have skill families, scoring architecture allowing
  keyword-stuffer compensation, location string mismatches) are documented
  in VALIDATION_LOG.md.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Multi-stage deterministic ranking pipeline designed to avoid the keyword-
  stuffer trap the JD explicitly describes. Five scoring components: (1)
  Structured JD-fit: title/function match with an off-target-title hard gate
  (not just a weighted input), experience band, must-have skill families,
  location, notice period. (2) TF-IDF/SVD semantic similarity on career_history
  prose vs. a JD-derived profile text — recovers candidates whose vocabulary
  paraphrases JD concepts rather than copying them (validated against 8
  manually-identified gold candidates who used rare synonyms like "Vector
  Representations" and "Search & Discovery"). (3) Trust multiplier: penalises
  profiles where self-reported proficiency diverges from platform-tested skill
  assessment scores. (4) Behavioral availability modifier from redrob_signals.
  (5) Honeypot hard gate: internal-consistency checks force fabricated profiles
  to the bottom regardless of other scores. Final score: 0.55*structured +
  0.45*semantic, multiplied by trust and availability. No GPU, no network, no
  hosted LLM API calls anywhere in the pipeline. Runtime: 116s cold-start on
  CPU (well inside the 5-minute budget).

